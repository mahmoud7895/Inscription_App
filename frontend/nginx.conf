server {
    listen 80;
    server_name localhost;

    # Emplacement des fichiers statiques Angular
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Essaye de servir le fichier, sinon redirige vers index.html (pour les routes Angular)
        try_files $uri $uri/ /index.html;
    }

    # Redirection des appels API vers le conteneur Spring Boot
    location /api/ {
        # 'backend' correspond au nom du service défini dans ton docker-compose.yml
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optionnel : Timeout pour les requêtes longues
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Gestion des erreurs (optionnel)
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}