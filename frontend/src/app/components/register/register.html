<div class="register-container">
  <div class="register-card">
    <h2>Créer un compte ✨</h2>
    <p class="subtitle">Rejoignez-nous en quelques secondes</p>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Nom</label>
        <input type="text" [(ngModel)]="user.nom" name="nom" placeholder="Votre nom" required />
      </div>

      <div class="form-group">
        <label>Prénom</label>
        <input type="text" [(ngModel)]="user.prenom" name="prenom" placeholder="Votre prénom" required />
      </div>

      <div class="form-group">
        <label>Âge</label>
        <input type="number" [(ngModel)]="user.age" name="age" placeholder="Votre âge" required />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="user.email" name="email" placeholder="exemple@email.com" required />
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" [(ngModel)]="user.password" name="password" placeholder="••••••••" required />
      </div>

      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="••••••••" required />
      </div>

      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Chargement...' : 'S\'inscrire' }}
      </button>
    </form>

    <p *ngIf="message" [ngClass]="isError ? 'error-message' : 'success-message'">
      {{ message }}
    </p>

    <p class="footer-text">
      Déjà un compte ? <a routerLink="/login">Se connecter</a>
    </p>
  </div>
</div>
